name: Antigravity Test

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  execute-agent:
    if: contains(github.event.issue.labels.*.name, 'antigravity')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g antigravity-cli
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT_TEXT: ${{ github.event.issue.body }}
        run: |
          agy trust .
          agy "${{ env.PROMPT_TEXT }}"
      - run: |
          git config --global user.name "antigravity-bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "🤖 Código actualizado por IA" || echo "Sin cambios"
          git push
          
