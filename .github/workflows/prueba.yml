name: Mi Agente IA

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created] # ¡Nuevo! Ahora el bot escucha comentarios

permissions:
  contents: write
  issues: write

jobs:
  ejecutar-ia:
    # Se ejecuta si el issue tiene el label OR si el comentario dice @antigravity
    if: >
      contains(github.event.issue.labels.*.name, 'antigravity') || 
      contains(github.event.comment.body, '@antigravity') ||
      contains(github.event.comment.body, '@AntiGravity')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar SDK de Gemini
        run: npm install @google/genai

      - name: El Cerebro de la IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # ¡Nuevo! Usa el texto del comentario si existe, si no, usa el cuerpo del issue
          PROMPT_TEXT: ${{ github.event.comment.body || github.event.issue.body }}
        run: |
          cat << 'EOF' > agente.js
          const { GoogleGenAI } = require('@google/genai');
          const fs = require('fs');
          
          const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
          const codigoActual = fs.readFileSync('index.html', 'utf8');
          const instruccion = process.env.PROMPT_TEXT + "\n\nEste es mi código actual:\n" + codigoActual + "\n\nReescribe el código aplicando los cambios solicitados. Devuelve SOLO el código HTML completo, sin bloques de markdown, sin comillas extra y sin explicaciones.";
          
          async function trabajar() {
            try {
              const response = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: instruccion,
              });
              // Limpieza mejorada para quitar bloques de código markdown si la IA los incluye
              let nuevoCodigo = response.text.replace(/```html/gi, '').replace(/```xml/gi, '').replace(/```svg/gi, '').replace(/```/g, '').trim();
              fs.writeFileSync('index.html', nuevoCodigo);
              console.log("¡Archivo reescrito con éxito!");
            } catch (error) {
              console.error("Error de la IA:", error);
              process.exit(1);
            }
          }
          trabajar();
          EOF
          node agente.js
          
      - name: Guardar Cambios
        run: |
          git config --global user.name "bot-ia"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "🤖 Código actualizado por IA" || echo "Sin cambios"
          git push
