<!DOCTYPE html>
<html>
<head>
    <title>Plano Arquitectónico Asimétrico - Fase Inicial</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" style="background-color: #ffffff; border: 4px solid #1a1a1a;">
  <style>
    .muro-perimetral { stroke: #1a1a1a; stroke-width: 15; fill: none; }
    .division-interior { stroke: #1a1a1a; stroke-width: 10; }
    
    .zona-comedor { fill: #f0f4f8; }
    .zona-cocina { fill: #f9f6f0; }
    .zona-despensa { fill: #f5ede1; }
    .zona-hall { fill: #e8ecef; }
    .zona-living { fill: #f4f1ea; }
    .zona-estudio { fill: #e0f2f7; }

    .texto-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
    .texto-sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; fill: #555555; text-anchor: middle; dominant-baseline: middle; }
    
    .puerta-hueco-perimetral { stroke: #ffffff; stroke-width: 15; fill: none; }
    .puerta-hueco-interior { stroke: #ffffff; stroke-width: 10; fill: none; }
    .puerta-hoja { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    .puerta-arco { stroke: #888888; stroke-width: 1; fill: none; stroke-linecap: round; }
    .ventana { stroke: #3498db; stroke-width: 8; fill: none; stroke-linecap: round; }
    
    .mueble-cocina { fill: #f0f0f0; stroke: #666666; stroke-width: 2; }
    .mueble-comedor { fill: #f0f0f0; stroke: #777777; stroke-width: 2; }
    .mueble-living { fill: #f0f0f0; stroke: #555555; stroke-width: 2; }
    .mueble-hall { fill: #f0f0f0; stroke: #707070; stroke-width: 2; }
    .mueble-estudio { fill: #f0f0f0; stroke: #5e84a2; stroke-width: 2; }

    .simbolo-lavaplatos { fill: none; stroke: #333333; stroke-width: 2; }
    .simbolo-quemador { fill: #333333; stroke: none; }
  </style>

  <!-- Definición de las zonas con sus rellenos -->
  <!-- Comedor (Cuadrante Superior Izquierdo) 5x5m -->
  <rect x="0" y="0" width="500" height="500" class="zona-comedor" />
  
  <!-- Despensa (subdivisión de Cocina, Superior Izquierda del cuadrante inferior izq) 5x1m -->
  <rect x="0" y="500" width="500" height="100" class="zona-despensa" />
  <!-- Cocina (parte principal, Inferior Izquierda del cuadrante inferior izq) 5x4m -->
  <rect x="0" y="600" width="500" height="400" class="zona-cocina" />

  <!-- Estudio (esquina superior derecha del cuadrante superior derecho) 4x4m -->
  <rect x="600" y="0" width="400" height="400" class="zona-estudio" />
  <!-- Hall de Acceso (L-shaped, rodeando el Estudio) -->
  <rect x="500" y="0" width="100" height="500" class="zona-hall" /> <!-- Vertical part of L -->
  <rect x="600" y="400" width="400" height="100" class="zona-hall" /> <!-- Horizontal part of L below study -->

  <!-- Living (Cuadrante Inferior Derecho) 5x5m -->
  <rect x="500" y="500" width="500" height="500" class="zona-living" />

  <!-- Muros divisores interiores - ELIMINADOS -->

  <!-- Aberturas: Puertas -->
  <!-- Puerta Principal (Acceso, Hall - Perímetro superior) -->
  <line x1="505" y1="0" x2="595" y2="0" class="puerta-hueco-perimetral" />
  <line x1="505" y1="0" x2="505" y2="90" class="puerta-hoja" />
  <path d="M 505 0 A 90 90 0 0 1 595 90" class="puerta-arco" />

  <!-- Aberturas: Ventanas -->
  <!-- Comedor -->
  <line x1="0" y1="175" x2="0" y2="325" class="ventana" />
  <line x1="175" y1="0" x2="325" y2="0" class="ventana" />
  <!-- Cocina -->
  <line x1="0" y1="725" x2="0" y2="875" class="ventana" />
  <line x1="175" y1="1000" x2="325" y2="1000" class="ventana" />
  <!-- Living -->
  <line x1="1000" y1="675" x2="1000" y2="825" class="ventana" />
  <line x1="675" y1="1000" x2="825" y2="1000" class="ventana" />
  <!-- Estudio -->
  <line x1="1000" y1="125" x2="1000" y2="275" class="ventana" />

  <!-- Mobiliario de Cocina -->
  <rect x="0" y="600" width="60" height="400" class="mueble-cocina" /> <!-- Mesón lateral izquierdo -->
  <rect x="60" y="940" width="440" height="60" class="mueble-cocina" /> <!-- Mesón inferior -->
  <rect x="420" y="610" width="70" height="80" class="mueble-cocina" /> <!-- Refrigerador -->
  <rect x="100" y="945" width="80" height="50" class="mueble-cocina" /> <!-- Base Lavaplatos -->
  <circle cx="125" cy="970" r="20" class="simbolo-lavaplatos" /> <!-- Lavaplatos 1 -->
  <circle cx="155" cy="970" r="20" class="simbolo-lavaplatos" /> <!-- Lavaplatos 2 -->
  <rect x="250" y="945" width="60" height="50" class="mueble-cocina" /> <!-- Base Encimera -->
  <circle cx="265" cy="960" r="10" class="simbolo-quemador" /> <!-- Quemador 1 -->
  <circle cx="295" cy="960" r="10" class="simbolo-quemador" /> <!-- Quemador 2 -->
  <circle cx="265" cy="980" r="10" class="simbolo-quemador" /> <!-- Quemador 3 -->
  <circle cx="295" cy="980" r="10" class="simbolo-quemador" /> <!-- Quemador 4 -->

  <!-- Mobiliario de Comedor -->
  <rect x="175" y="205" width="150" height="90" class="mueble-comedor" /> <!-- Mesa -->
  <rect x="130" y="215" width="40" height="40" class="mueble-comedor" /> <!-- Silla 1 -->
  <rect x="130" y="265" width="40" height="40" class="mueble-comedor" /> <!-- Silla 2 -->
  <rect x="335" y="215" width="40" height="40" class="mueble-comedor" /> <!-- Silla 3 -->
  <rect x="335" y="265" width="40" height="40" class="mueble-comedor" /> <!-- Silla 4 -->
  <rect x="220" y="160" width="40" height="40" class="mueble-comedor" /> <!-- Silla 5 -->
  <rect x="220" y="300" width="40" height="40" class="mueble-comedor" /> <!-- Silla 6 -->

  <!-- Mobiliario de Living -->
  <rect x="650" y="910" width="200" height="90" rx="10" ry="10" class="mueble-living" /> <!-- Sofá -->
  <line x1="650" y1="940" x2="850" y2="940" stroke="#f0f0f0" stroke-width="2" /> <!-- Sofa cushion lines -->
  <line x1="716" y1="910" x2="716" y2="1000" stroke="#555555" stroke-width="2" />
  <line x1="783" y1="910" x2="783" y2="1000" stroke="#555555" stroke-width="2" />
  <rect x="675" y="690" width="150" height="40" class="mueble-living" /> <!-- Mueble TV -->
  <rect x="700" y="770" width="100" height="60" rx="5" ry="5" class="mueble-living" /> <!-- Mesa de centro -->

  <!-- Mobiliario de Estudio -->
  <rect x="820" y="140" width="120" height="60" rx="5" ry="5" class="mueble-estudio" /> <!-- Escritorio -->
  <circle cx="760" cy="170" r="20" class="mueble-estudio" /> <!-- Silla de escritorio -->

  <!-- Textos Técnicos: Comedor -->
  <text x="250" y="230" class="texto-principal">COMEDOR</text>
  <text x="250" y="270" class="texto-sub">25 m² (5.00m x 5.00m)</text>
  
  <!-- Textos Técnicos: Despensa -->
  <text x="250" y="540" class="texto-principal">DESPENSA</text>
  <text x="250" y="565" class="texto-sub">5 m² (5.00m x 1.00m)</text>

  <!-- Textos Técnicos: Cocina -->
  <text x="250" y="740" class="texto-principal">COCINA</text>
  <text x="250" y="775" class="texto-sub">20 m² (5.00m x 4.00m)</text>
  
  <!-- Textos Técnicos: Hall de Acceso -->
  <text x="750" y="450" class="texto-principal">HALL DE ACCESO</text>
  <text x="750" y="480" class="texto-sub">9 m² (Aprox.)</text>

  <!-- Textos Técnicos: Estudio -->
  <text x="800" y="200" class="texto-principal">ESTUDIO</text>
  <text x="800" y="230" class="texto-sub">16 m² (4.00m x 4.00m)</text>

  <!-- Textos Técnicos: Living -->
  <text x="750" y="750" class="texto-principal">LIVING</text>
  <text x="750" y="790" class="texto-sub">25 m² (5.00m x 5.00m)</text>

  <!-- Muro Perimetral Final (dibujado último para superponer el trazo) -->
  <rect x="0" y="0" width="1000" height="1000" class="muro-perimetral" />
</svg>
</body>
</html>
