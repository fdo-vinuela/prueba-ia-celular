<!DOCTYPE html>
<html>
<head>
    <title>Mi App Móvil</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" style="background-color: #ffffff; border: 4px solid #1a1a1a;">
  <style>
    .muro-perimetral { stroke: #1a1a1a; stroke-width: 12; fill: none; }
    .division-interior { stroke: #1a1a1a; stroke-width: 8; }
    .muro-boceto { stroke: #e74c3c; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .zona-comedor { fill: #f0f4f8; }
    .zona-cocina { fill: #f9f6f0; }
    .zona-hall { fill: #e8ecef; }
    .zona-living { fill: #f4f1ea; }
    .texto-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
    .texto-sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; fill: #555555; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <rect x="0" y="0" width="500" height="500" class="zona-comedor" />
  <rect x="0" y="500" width="500" height="500" class="zona-cocina" />
  <rect x="500" y="0" width="500" height="500" class="zona-hall" />
  <rect x="500" y="500" width="500" height="500" class="zona-living" />

  <line x1="500" y1="0" x2="500" y2="1000" class="division-interior" />
  <line x1="0" y1="500" x2="1000" y2="500" class="division-interior" />

  <line x1="0" y1="550" x2="500" y2="550" class="muro-boceto" />
  <polyline points="600,0 600,400 1000,400" class="muro-boceto" />

  <text x="250" y="230" class="texto-principal">COMEDOR</text>
  <text x="250" y="270" class="texto-sub">25 m² (5.00m x 5.00m)</text>

  <text x="250" y="730" class="texto-principal">COCINA</text>
  <text x="250" y="770" class="texto-sub">Modificado</text>

  <text x="750" y="230" class="texto-principal">HALL DE ACCESO</text>
  <text x="750" y="270" class="texto-sub">Modificado</text>

  <text x="750" y="730" class="texto-principal">LIVING</text>
  <text x="750" y="770" class="texto-sub">25 m² (5.00m x 5.00m)</text>

  <rect x="0" y="0" width="1000" height="1000" class="muro-perimetral" />
</svg>
</body>
</html>
