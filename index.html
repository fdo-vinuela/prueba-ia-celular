<!DOCTYPE html>
<html>
<head>
    <title>Mi App Móvil</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" style="background-color: #ffffff; border: 4px solid #1a1a1a;">
      <style>
        .muro-perimetral { stroke: #1a1a1a; stroke-width: 12; fill: none; }
        .division-interior { stroke: #1a1a1a; stroke-width: 8; }
        .zona-cocina { fill: #f9f6f0; }
        .zona-living { fill: #f0f4f8; }
        .texto-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 36px; font-weight: bold; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
        .texto-sub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; fill: #555555; text-anchor: middle; dominant-baseline: middle; }
      </style>

      <rect x="0" y="0" width="500" height="1000" class="zona-cocina" />
      
      <rect x="500" y="0" width="500" height="1000" class="zona-living" />

      <line x1="500" y1="0" x2="500" y2="1000" class="division-interior" />

      <text x="250" y="480" class="texto-principal">COCINA</text>
      <text x="250" y="530" class="texto-sub">50 m² (5.00m x 10.00m)</text>

      <text x="750" y="480" class="texto-principal">COMEDOR - LIVING</text>
      <text x="750" y="530" class="texto-sub">50 m² (5.00m x 10.00m)</text>

      <rect x="0" y="0" width="1000" height="1000" class="muro-perimetral" />
    </svg>
</body>
</html>
